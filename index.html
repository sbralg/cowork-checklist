<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ações">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<title>Ações pendentes</title>
<!--
  Data-free shell for the daily-summary checklist. Hosted on public GitHub
  Pages. It contains NO keys and NO data: it asks for a passphrase and then
  talks only to the gated Supabase Edge Function (checklist-api), which holds
  the service-role key and enforces the passphrase server-side. Without the
  passphrase, all anyone sees here is a login box.
-->
<style>
  :root{
    --bg:#f7f7f8; --card:#ffffff; --text:#1a1a1a; --muted:#6b7280;
    --border:#e5e7eb; --border-strong:#d1d5db; --accent:#2563eb;
    --accent-text:#ffffff; --danger:#dc2626;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --muted:#94a3b8;
      --border:#334155; --border-strong:#475569; --accent:#3b82f6;
      --accent-text:#ffffff; --danger:#f87171;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:640px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:4px 0 16px}
  h1{font-size:20px;font-weight:650;margin:0}
  .link{background:none;border:none;color:var(--muted);font-size:13px;padding:4px;cursor:pointer;text-decoration:none;display:inline-block}
  .nav{display:flex;align-items:center;gap:6px;flex:none}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .row{display:flex;align-items:flex-start;gap:12px;padding:16px 14px;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row label{flex:1;min-width:0;display:flex;align-items:flex-start;gap:12px;cursor:pointer}
  input[type=checkbox]{width:24px;height:24px;margin:1px 0 0;flex:none;accent-color:var(--accent)}
  .badge{font-size:20px;line-height:1.2;flex:none;width:26px;text-align:center}
  .body{min-width:0}
  .body .txt{font-size:15px;line-height:1.35;margin:0;word-wrap:break-word}
  .body .meta{font-size:12px;color:var(--muted);margin:3px 0 0}
  .msg{padding:28px 8px;text-align:center;color:var(--muted);font-size:15px}
  .msg.err{color:var(--danger)}
  .login{max-width:360px;margin:12vh auto 0;text-align:center}
  .login h2{font-size:18px;margin:0 0 4px}
  .login p{color:var(--muted);font-size:14px;margin:0 0 20px}
  input[type=password]{
    width:100%;font:inherit;font-size:16px;padding:14px;border-radius:12px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);margin-bottom:12px;
  }
  .bar{
    position:fixed;left:0;right:0;bottom:0;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--bg) 70%,transparent);
    display:flex;justify-content:center;
  }
  button.primary{
    font:inherit;font-weight:600;font-size:16px;border:none;border-radius:14px;
    padding:15px 20px;min-height:52px;cursor:pointer;width:100%;max-width:640px;
    background:var(--accent);color:var(--accent-text);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  button.primary:disabled{opacity:.5}
  .loginerr{color:var(--danger);font-size:13px;min-height:18px;margin-bottom:8px}
  .addrow{display:flex;gap:8px;padding:14px}
  .addrow input{
    flex:1;min-width:0;font:inherit;font-size:15px;padding:10px 12px;border-radius:10px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);
  }
  .addrow button{
    flex:none;font:inherit;font-weight:600;font-size:14px;padding:10px 14px;border-radius:10px;
    border:none;background:var(--accent);color:var(--accent-text);cursor:pointer;
  }
  .addrow button:disabled{opacity:.5}
  .addcard{margin-bottom:12px}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:16px;padding:6px;cursor:pointer;flex:none;line-height:1;align-self:flex-start}
  .icon-btn.danger{color:var(--danger)}
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .modal-card{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:400px}
  .modal-card h3{margin:0 0 14px;font-size:16px}
  .modal-card label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px}
  .modal-card input[type=text], .modal-card select{
    width:100%;font:inherit;font-size:15px;padding:10px 12px;border-radius:10px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);margin-bottom:14px;
  }
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .modal-actions button{
    font:inherit;font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;
    border:none;cursor:pointer;
  }
  .modal-actions .cancel{background:none;color:var(--muted)}
  .modal-actions .save{background:var(--accent);color:var(--accent-text)}
</style>
</head>
<body>
<div id="root" class="wrap"><p class="msg">Carregando…</p></div>
<div class="bar" id="bar" style="display:none">
  <button class="primary" id="done-btn"><span>✓</span> <span id="btn-label">Concluir selecionados</span></button>
</div>

<script>
const API = "https://opehbckfmfschpvbhxvo.supabase.co/functions/v1/checklist-api";
const PASS_KEY = "checklist_pass";

const root = document.getElementById("root");
const bar = document.getElementById("bar");
const doneBtn = document.getElementById("done-btn");
const btnLabel = document.getElementById("btn-label");

function getPass(){ return localStorage.getItem(PASS_KEY) || ""; }

async function api(action, extra){
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-checklist-pass": getPass() },
    body: JSON.stringify(Object.assign({ action }, extra || {}))
  });
  if(r.status === 401){ const e = new Error("unauthorized"); e.unauthorized = true; throw e; }
  if(!r.ok) throw new Error("http " + r.status);
  return await r.json();
}

function esc(s){
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function fmtDate(iso){
  if(!iso) return "";
  try{
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}) + " " +
           d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }catch(e){ return ""; }
}
const SOURCE_META = {
  email:            { emoji:"📧", label:"E-mail" },
  whatsapp:         { emoji:"💬", label:"WhatsApp" },
  calendar:         { emoji:"📅", label:"Agenda" },
  self_instruction: { emoji:"🔔", label:"Instrução" },
  work:             { emoji:"💼", label:"Trabalho" },
  system:           { emoji:"⚙️", label:"Sistema" },
  manual:           { emoji:"📝", label:"Manual" }
};

function showLogin(errText){
  bar.style.display = "none";
  root.innerHTML =
    '<div class="login">' +
      '<h2>Ações pendentes</h2>' +
      '<p>Digite a senha para acessar seu checklist.</p>' +
      '<div class="loginerr">' + (errText ? esc(errText) : "") + '</div>' +
      '<input type="password" id="pw" autocomplete="current-password" placeholder="Senha" />' +
      '<button class="primary" id="enter">Entrar</button>' +
    '</div>';
  const pw = document.getElementById("pw");
  const go = () => {
    const v = pw.value.trim();
    if(!v) return;
    localStorage.setItem(PASS_KEY, v);
    load();
  };
  document.getElementById("enter").addEventListener("click", go);
  pw.addEventListener("keydown", e => { if(e.key === "Enter") go(); });
  pw.focus();
}

function updateBar(){
  const n = document.querySelectorAll("#root input:checked").length;
  doneBtn.disabled = n === 0;
  btnLabel.textContent = n === 0 ? "Concluir selecionados"
    : (n === 1 ? "Concluir 1 item" : "Concluir " + n + " itens");
}

function render(rows){
  const header = '<header><h1>Ações pendentes</h1><div class="nav">' +
    '<a class="link" href="shopping.html">🛒 Compras</a>' +
    '<button class="link" id="logout">Sair</button></div></header>';
  const addForm = '<div class="card addcard"><div class="addrow">' +
    '<input type="text" id="new-text" placeholder="Nova ação..." />' +
    '<button id="add-btn">Adicionar</button>' +
    '</div></div>';
  if(rows.length === 0){
    root.innerHTML = header + addForm +
      '<p class="msg">🎉 Nenhuma ação pendente.</p>';
    bar.style.display = "none";
    wireHeader();
    wireAddForm();
    return;
  }
  root.innerHTML = header + addForm +
    '<div class="card">' + rows.map(it => {
      const m = SOURCE_META[it.source] || { emoji:"•", label: it.source || "" };
      return '<div class="row">' +
        '<label>' +
        '<input type="checkbox" data-id="' + esc(it.id) + '">' +
        '<span class="badge">' + m.emoji + '</span>' +
        '<span class="body"><p class="txt">' + esc(it.text) + '</p>' +
        '<p class="meta">' + m.label + ' · desde ' + fmtDate(it.first_seen) + '</p></span>' +
        '</label>' +
        '<button class="icon-btn" data-edit-id="' + esc(it.id) + '" title="Editar">✎</button>' +
        '<button class="icon-btn danger" data-del-id="' + esc(it.id) + '" title="Excluir" aria-label="Excluir">🗑</button>' +
        '</div>';
    }).join("") + '</div>';
  bar.style.display = "flex";
  root.querySelectorAll("input[type=checkbox]").forEach(cb => cb.addEventListener("change", updateBar));
  wireHeader();
  wireAddForm();
  wireDeleteButtons();
  wireEditControls(rows);
  updateBar();
}

function wireHeader(){
  const lo = document.getElementById("logout");
  if(lo) lo.addEventListener("click", () => { localStorage.removeItem(PASS_KEY); showLogin(); });
}

function wireAddForm(){
  const btn = document.getElementById("add-btn");
  const input = document.getElementById("new-text");
  if(!btn || !input) return;
  const submit = async () => {
    const text = input.value.trim();
    if(!text) return;
    btn.disabled = true;
    btn.textContent = "Salvando…";
    try{
      await api("action_create", { text });
      await load();
    }catch(e){
      if(e.unauthorized){ localStorage.removeItem(PASS_KEY); showLogin("Sessão expirada, entre novamente."); }
      else { btn.textContent = "Erro — tente de novo"; btn.disabled = false; }
    }
  };
  btn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if(e.key === "Enter") submit(); });
}

function wireDeleteButtons(){
  root.querySelectorAll("[data-del-id]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if(!confirm("Excluir esta ação?")) return;
      const id = btn.dataset.delId;
      btn.disabled = true;
      try{
        await api("action_delete", { ids: [id] });
        await load();
      }catch(e){
        if(e.unauthorized){ localStorage.removeItem(PASS_KEY); showLogin("Sessão expirada, entre novamente."); }
        else { btn.disabled = false; }
      }
    });
  });
}

async function saveEdit(id, patch){
  try{
    await api("action_edit", Object.assign({ id }, patch));
    await load();
  }catch(e){
    if(e.unauthorized){ localStorage.removeItem(PASS_KEY); showLogin("Sessão expirada, entre novamente."); }
    else alert("Não foi possível salvar.");
  }
}

function openEditModal(it){
  const optionsHtml = Object.keys(SOURCE_META).map(key => {
    const meta = SOURCE_META[key];
    return '<option value="' + key + '"' + (key === it.source ? ' selected' : '') + '>' +
      meta.emoji + ' ' + meta.label + '</option>';
  }).join("");

  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML =
    '<div class="modal-card">' +
      '<h3>Editar ação</h3>' +
      '<label for="edit-text-input">Texto</label>' +
      '<input type="text" id="edit-text-input" value="' + esc(it.text) + '">' +
      '<label for="edit-cat-select">Categoria</label>' +
      '<select id="edit-cat-select">' + optionsHtml + '</select>' +
      '<div class="modal-actions">' +
        '<button class="cancel" id="edit-cancel">Cancelar</button>' +
        '<button class="save" id="edit-save">Salvar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(backdrop);

  const close = () => {
    backdrop.remove();
    document.removeEventListener("keydown", onKey);
  };
  function onKey(e){ if(e.key === "Escape") close(); }
  document.addEventListener("keydown", onKey);
  backdrop.addEventListener("click", e => { if(e.target === backdrop) close(); });
  document.getElementById("edit-cancel").addEventListener("click", close);

  const textInput = document.getElementById("edit-text-input");
  textInput.focus();
  textInput.select();

  document.getElementById("edit-save").addEventListener("click", async () => {
    const text = textInput.value.trim();
    const source = document.getElementById("edit-cat-select").value;
    if(!text){ alert("O texto não pode ficar vazio."); return; }
    const patch = {};
    if(text !== it.text) patch.text = text;
    if(source !== it.source) patch.source = source;
    close();
    if(Object.keys(patch).length === 0) return;
    await saveEdit(it.id, patch);
  });
}

function wireEditControls(rows){
  root.querySelectorAll("[data-edit-id]").forEach(btn => {
    btn.addEventListener("click", () => {
      const it = rows.find(r => r.id === btn.dataset.editId);
      if(it) openEditModal(it);
    });
  });
}

async function load(){
  root.innerHTML = '<p class="msg">Carregando…</p>';
  bar.style.display = "none";
  if(!getPass()){ showLogin(); return; }
  try{
    const data = await api("list");
    render(data.actions || []);
  }catch(e){
    if(e.unauthorized){
      localStorage.removeItem(PASS_KEY);
      showLogin("Senha incorreta.");
    }else{
      root.innerHTML = '<p class="msg err">Não foi possível carregar agora.</p>' +
        '<p class="msg"><button class="link" onclick="load()">Tentar novamente</button></p>';
    }
  }
}

doneBtn.addEventListener("click", async () => {
  const ids = Array.from(document.querySelectorAll("#root input:checked")).map(cb => cb.dataset.id);
  if(ids.length === 0) return;
  doneBtn.disabled = true;
  btnLabel.textContent = "Salvando…";
  try{
    await api("done", { ids });
    await load();
  }catch(e){
    if(e.unauthorized){ localStorage.removeItem(PASS_KEY); showLogin("Sessão expirada, entre novamente."); }
    else { btnLabel.textContent = "Erro ao salvar — tente de novo"; doneBtn.disabled = false; }
  }
});

load();
</script>
</body>
</html>

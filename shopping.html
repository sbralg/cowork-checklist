<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Compras">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<title>Listas de compras</title>
<!--
  Data-free shell for the shopping-list module. Same pattern as index.html
  (the daily-summary checklist): hosted on public GitHub Pages, holds NO
  keys and NO data, asks for the shared passphrase, then talks only to the
  gated Supabase Edge Function (checklist-api) via its shopping_* actions.
-->
<style>
  :root{
    --bg:#f7f7f8; --card:#ffffff; --text:#1a1a1a; --muted:#6b7280;
    --border:#e5e7eb; --border-strong:#d1d5db; --accent:#2563eb;
    --accent-text:#ffffff; --danger:#dc2626;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --muted:#94a3b8;
      --border:#334155; --border-strong:#475569; --accent:#3b82f6;
      --accent-text:#ffffff; --danger:#f87171;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:640px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:4px 0 8px}
  .hleft{display:flex;align-items:baseline;gap:10px;min-width:0;flex:1}
  .subheader{display:flex;align-items:baseline;justify-content:space-between;gap:10px;min-width:0;margin:0 0 16px}
  .list-title{display:flex;align-items:baseline;gap:8px;min-width:0}
  h1{font-size:20px;font-weight:650;margin:0;min-width:0;overflow-wrap:break-word}
  h2{font-size:17px;font-weight:650;margin:0;min-width:0;overflow-wrap:break-word}
  .link{
    background:none;border:none;color:var(--muted);font-size:13px;padding:4px;cursor:pointer;
    text-decoration:none;display:inline-block;transition:color .15s ease,opacity .1s ease;
  }
  .link:hover{color:var(--text);text-decoration:underline}
  .link:active{opacity:.6}
  .menu-btn{
    background:none;border:none;color:var(--text);font-size:22px;padding:2px 8px 2px 0;
    cursor:pointer;line-height:1;flex:none;align-self:center;
    transition:opacity .15s ease,transform .1s ease;
  }
  .menu-btn:hover{opacity:.7}
  .menu-btn:active{transform:scale(.9)}
  .menu-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
    animation:modalFadeIn .15s ease;
  }
  .menu-panel{
    position:fixed;top:0;left:0;bottom:0;width:min(280px,80vw);
    background:var(--card);box-shadow:2px 0 24px rgba(0,0,0,.3);
    display:flex;flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 0 max(16px,env(safe-area-inset-bottom));
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .menu-panel.open{transform:translateX(0)}
  .menu-item{
    display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;
    color:var(--text);text-decoration:none;background:none;border:none;width:100%;
    text-align:left;cursor:pointer;transition:background-color .15s ease;
  }
  .menu-item:hover{background:rgba(127,127,127,.08)}
  .menu-item.active{color:var(--accent);font-weight:600}
  .menu-spacer{flex:1}
  .menu-item.logout{border-top:1px solid var(--border);color:var(--danger)}
  .icon-btn{
    background:none;border:none;color:var(--muted);font-size:16px;padding:6px;cursor:pointer;
    flex:none;line-height:1;border-radius:8px;
    transition:background-color .15s ease,color .15s ease,transform .1s ease;
  }
  .icon-btn:hover{background:rgba(127,127,127,.15);color:var(--text)}
  .icon-btn:active{transform:scale(.9)}
  .icon-btn.danger{color:var(--danger)}
  .icon-btn.danger:hover{background:rgba(220,38,38,.15);color:var(--danger)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .row{display:flex;align-items:center;gap:8px;padding:14px;border-bottom:1px solid var(--border);transition:background-color .15s ease}
  .row:hover{background:rgba(127,127,127,.06)}
  .row:last-child{border-bottom:none}
  .row label{flex:1;min-width:0;display:flex;align-items:center;gap:12px;cursor:pointer}
  input[type=checkbox]{width:24px;height:24px;margin:0;flex:none;accent-color:var(--accent)}
  .badge{font-size:20px;line-height:1.2;flex:none;width:26px;text-align:center}
  .body{min-width:0;flex:1}
  .body .txt{font-size:15px;line-height:1.35;margin:0;word-wrap:break-word}
  .body .txt.done{text-decoration:line-through;color:var(--muted)}
  .body .meta{font-size:12px;color:var(--muted);margin:3px 0 0}
  .price-input{
    width:84px;flex:none;font:inherit;font-size:14px;padding:8px;border-radius:8px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);text-align:right;
  }
  .msg{padding:28px 8px;text-align:center;color:var(--muted);font-size:15px}
  .msg.err{color:var(--danger)}
  .login{max-width:360px;margin:12vh auto 0;text-align:center}
  .login h2{font-size:18px;margin:0 0 4px}
  .login p{color:var(--muted);font-size:14px;margin:0 0 20px}
  input[type=password]{
    width:100%;font:inherit;font-size:16px;padding:14px;border-radius:12px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);margin-bottom:12px;
  }
  button.primary{
    font:inherit;font-weight:600;font-size:16px;border:none;border-radius:14px;
    padding:15px 20px;min-height:52px;cursor:pointer;width:100%;max-width:640px;
    background:var(--accent);color:var(--accent-text);
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:filter .15s ease,transform .1s ease;
  }
  button.primary:hover:not(:disabled){filter:brightness(1.1)}
  button.primary:active:not(:disabled){transform:scale(.98)}
  button.primary:disabled{opacity:.5}
  button.primary.small{min-height:44px;padding:10px 16px;font-size:14px;width:auto;flex:none}
  .loginerr{color:var(--danger);font-size:13px;min-height:18px;margin-bottom:8px}
  .addrow{display:flex;gap:8px;margin-top:14px}
  .addrow input[type=text]{
    flex:1;min-width:0;font:inherit;font-size:15px;padding:10px 12px;border-radius:10px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);
  }
  .addrow input.price{width:84px;flex:none;text-align:right}
  .addrow input.emoji{width:52px;flex:none;text-align:center;font-size:18px;padding:10px 6px}
  .total-bar{padding:12px 4px 0;text-align:right;color:var(--muted);font-size:13px}
  .total-bar strong{color:var(--text);font-size:14px}
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:16px;
    animation:modalFadeIn .15s ease;
  }
  .modal-card{
    background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:400px;
    animation:modalPopIn .18s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes modalFadeIn{from{opacity:0} to{opacity:1}}
  @keyframes modalPopIn{
    from{opacity:0;transform:scale(.95) translateY(6px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  .modal-card h3{margin:0 0 14px;font-size:16px}
  .modal-card p{font-size:15px;line-height:1.4;margin:0 0 18px}
  .modal-card label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px}
  .modal-card input[type=text]{
    width:100%;font:inherit;font-size:15px;padding:10px 12px;border-radius:10px;
    border:1px solid var(--border-strong);background:var(--card);color:var(--text);margin-bottom:14px;
  }
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .modal-actions button{
    font:inherit;font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;
    border:none;cursor:pointer;transition:filter .15s ease,transform .1s ease,background-color .15s ease;
  }
  .modal-actions button:active{transform:scale(.97)}
  .modal-actions .cancel{background:none;color:var(--muted)}
  .modal-actions .cancel:hover{background:rgba(127,127,127,.12);color:var(--text)}
  .modal-actions .save{background:var(--accent);color:var(--accent-text)}
  .modal-actions .save.danger{background:var(--danger)}
  .modal-actions .save:hover{filter:brightness(1.1)}
</style>
</head>
<body>
<div id="root" class="wrap"><p class="msg">Carregando…</p></div>

<script>
const API = "https://opehbckfmfschpvbhxvo.supabase.co/functions/v1/checklist-api";
const PASS_KEY = "checklist_pass";

const root = document.getElementById("root");
let currentList = null; // set when viewing a single list's items

function getPass(){ return localStorage.getItem(PASS_KEY) || ""; }

async function api(action, extra){
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-checklist-pass": getPass() },
    body: JSON.stringify(Object.assign({ action }, extra || {}))
  });
  if(r.status === 401){ const e = new Error("unauthorized"); e.unauthorized = true; throw e; }
  if(!r.ok) throw new Error("http " + r.status);
  return await r.json();
}

function esc(s){
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function fmtMoney(v){
  return new Intl.NumberFormat("pt-BR", { style:"currency", currency:"BRL" }).format(Number(v) || 0);
}

// Returns just the first grapheme cluster of a string -- unlike a raw
// character/length check, this correctly treats a compound emoji (skin
// tone modifiers, ZWJ sequences, flags) as a single "character" instead
// of cutting it apart mid-sequence.
function firstGrapheme(str){
  if(!str) return "";
  if(typeof Intl !== "undefined" && Intl.Segmenter){
    const seg = new Intl.Segmenter(undefined, { granularity: "grapheme" });
    const first = seg.segment(str)[Symbol.iterator]().next();
    return first.done ? "" : first.value.segment;
  }
  return Array.from(str)[0] || "";
}

// Live-truncates an emoji <input> to a single grapheme as the user types
// or pastes, instead of just capping length at submit time.
function limitToOneEmoji(input){
  input.addEventListener("input", () => {
    const limited = firstGrapheme(input.value);
    if(input.value !== limited) input.value = limited;
  });
}

const CURRENT_PAGE = "shopping";
const MENU_ITEMS = [
  { page: "index", href: "index.html", emoji: "✓", label: "Tarefas" },
  { page: "shopping", href: "shopping.html", emoji: "🛒", label: "Compras" },
];

function wireMenuButton(){
  const btn = document.getElementById("menu-btn");
  if(btn) btn.addEventListener("click", openMenu);
}

function openMenu(){
  const itemsHtml = MENU_ITEMS.map(item => {
    if(item.page === CURRENT_PAGE){
      return '<span class="menu-item active">' + item.emoji + ' ' + item.label + '</span>';
    }
    return '<a class="menu-item" href="' + item.href + '">' + item.emoji + ' ' + item.label + '</a>';
  }).join("");

  const backdrop = document.createElement("div");
  backdrop.className = "menu-backdrop";
  backdrop.innerHTML =
    '<div class="menu-panel" id="menu-panel">' +
      itemsHtml +
      '<div class="menu-spacer"></div>' +
      '<button class="menu-item logout" id="menu-logout">🚪 Sair</button>' +
    '</div>';
  document.body.appendChild(backdrop);
  const panel = document.getElementById("menu-panel");
  requestAnimationFrame(() => requestAnimationFrame(() => panel.classList.add("open")));

  const close = () => {
    panel.classList.remove("open");
    document.removeEventListener("keydown", onKey);
    setTimeout(() => backdrop.remove(), 250);
  };
  function onKey(e){ if(e.key === "Escape") close(); }
  document.addEventListener("keydown", onKey);
  backdrop.addEventListener("click", e => { if(e.target === backdrop) close(); });
  document.getElementById("menu-logout").addEventListener("click", () => {
    localStorage.removeItem(PASS_KEY);
    close();
    showLogin();
  });
}

function confirmModal(message, confirmLabel){
  return new Promise(resolve => {
    const backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop";
    backdrop.innerHTML =
      '<div class="modal-card">' +
        '<p>' + esc(message) + '</p>' +
        '<div class="modal-actions">' +
          '<button class="cancel" id="confirm-cancel">Cancelar</button>' +
          '<button class="save danger" id="confirm-ok">' + esc(confirmLabel || "Excluir") + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(backdrop);
    const close = (result) => {
      backdrop.remove();
      document.removeEventListener("keydown", onKey);
      resolve(result);
    };
    function onKey(e){ if(e.key === "Escape") close(false); }
    document.addEventListener("keydown", onKey);
    backdrop.addEventListener("click", e => { if(e.target === backdrop) close(false); });
    document.getElementById("confirm-cancel").addEventListener("click", () => close(false));
    document.getElementById("confirm-ok").addEventListener("click", () => close(true));
  });
}

function promptModal(title, label, currentValue){
  return new Promise(resolve => {
    const backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop";
    backdrop.innerHTML =
      '<div class="modal-card">' +
        '<h3>' + esc(title) + '</h3>' +
        '<label for="prompt-input">' + esc(label) + '</label>' +
        '<input type="text" id="prompt-input" value="' + esc(currentValue || "") + '">' +
        '<div class="modal-actions">' +
          '<button class="cancel" id="prompt-cancel">Cancelar</button>' +
          '<button class="save" id="prompt-ok">Salvar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(backdrop);
    const close = (result) => {
      backdrop.remove();
      document.removeEventListener("keydown", onKey);
      resolve(result);
    };
    const ok = () => close(input.value);
    function onKey(e){
      if(e.key === "Escape") close(null);
      if(e.key === "Enter"){ e.preventDefault(); ok(); }
    }
    document.addEventListener("keydown", onKey);
    backdrop.addEventListener("click", e => { if(e.target === backdrop) close(null); });
    document.getElementById("prompt-cancel").addEventListener("click", () => close(null));
    document.getElementById("prompt-ok").addEventListener("click", ok);
    const input = document.getElementById("prompt-input");
    input.focus();
    input.select();
  });
}

function openListEditModal(list, onSaved){
  const currentEmoji = list.emoji || "🛒";
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML =
    '<div class="modal-card">' +
      '<h3>Editar lista</h3>' +
      '<label for="edit-list-emoji">Ícone (emoji)</label>' +
      '<input type="text" id="edit-list-emoji" value="' + esc(currentEmoji) + '">' +
      '<label for="edit-list-name">Nome</label>' +
      '<input type="text" id="edit-list-name" value="' + esc(list.name) + '">' +
      '<div class="modal-actions">' +
        '<button class="cancel" id="edit-list-cancel">Cancelar</button>' +
        '<button class="save" id="edit-list-save">Salvar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(backdrop);

  const close = () => {
    backdrop.remove();
    document.removeEventListener("keydown", onKey);
  };
  function onKey(e){ if(e.key === "Escape") close(); }
  document.addEventListener("keydown", onKey);
  backdrop.addEventListener("click", e => { if(e.target === backdrop) close(); });
  document.getElementById("edit-list-cancel").addEventListener("click", close);

  const nameInput = document.getElementById("edit-list-name");
  limitToOneEmoji(document.getElementById("edit-list-emoji"));
  nameInput.focus();
  nameInput.select();

  document.getElementById("edit-list-save").addEventListener("click", async () => {
    const name = nameInput.value.trim();
    const emoji = document.getElementById("edit-list-emoji").value.trim();
    if(!name){ alert("O nome não pode ficar vazio."); return; }
    close();
    const tasks = [];
    if(name !== list.name) tasks.push(api("shopping_list_rename", { id: list.id, name }));
    if(emoji !== currentEmoji) tasks.push(api("shopping_list_set_emoji", { id: list.id, emoji: emoji || null }));
    if(tasks.length === 0) return;
    try{ await Promise.all(tasks); onSaved(); }
    catch(e){ handleAuthError(e, onSaved); }
  });
}

function showLogin(errText){
  root.innerHTML =
    '<div class="login">' +
      '<h2>Listas de compras</h2>' +
      '<p>Digite a senha para acessar.</p>' +
      '<div class="loginerr">' + (errText ? esc(errText) : "") + '</div>' +
      '<input type="password" id="pw" autocomplete="current-password" placeholder="Senha" />' +
      '<button class="primary" id="enter">Entrar</button>' +
    '</div>';
  const pw = document.getElementById("pw");
  const go = () => {
    const v = pw.value.trim();
    if(!v) return;
    localStorage.setItem(PASS_KEY, v);
    loadLists();
  };
  document.getElementById("enter").addEventListener("click", go);
  pw.addEventListener("keydown", e => { if(e.key === "Enter") go(); });
  pw.focus();
}

function handleAuthError(e, retry){
  if(e.unauthorized){
    localStorage.removeItem(PASS_KEY);
    showLogin("Sessão expirada, entre novamente.");
  }else{
    root.innerHTML = '<p class="msg err">Não foi possível carregar agora.</p>' +
      '<p class="msg"><button class="link" onclick="(' + retry.toString() + ')()">Tentar novamente</button></p>';
  }
}

function navHeader(title, backAction, emoji){
  // Top row is always the same: menu button, then the page title right
  // after it -- regardless of screen.
  const topRow = '<header><div class="hleft">' +
    '<button class="menu-btn" id="menu-btn" aria-label="Menu">☰</button>' +
    '<h1 style="flex:1">' + (backAction ? 'Listas de compras' : esc(title)) + '</h1>' +
    '</div></header>';
  if(!backAction) return topRow;

  // Items view: the list itself becomes a subtitle row below -- "← Listas"
  // on the left, the list's icon + name grouped on the right.
  const emojiBtn = emoji ? '<span class="badge">' + emoji + '</span>' : '';
  const subRow = '<div class="subheader">' +
    '<button class="link" id="back">← Listas</button>' +
    '<span class="list-title">' + emojiBtn + '<h2>' + esc(title) + '</h2></span>' +
  '</div>';
  return topRow + subRow;
}

function wireNav(backAction){
  wireMenuButton();
  if(backAction) document.getElementById("back").addEventListener("click", backAction);
}

// ---- lists screen ----

async function loadLists(){
  root.innerHTML = '<p class="msg">Carregando…</p>';
  currentList = null;
  if(!getPass()){ showLogin(); return; }
  try{
    const data = await api("shopping_lists");
    renderLists(data.lists || []);
  }catch(e){ handleAuthError(e, loadLists); }
}

function renderLists(lists){
  const rowsHtml = lists.length === 0
    ? '<p class="msg">Nenhuma lista ainda. Crie uma abaixo.</p>'
    : '<div class="card">' + lists.map(l => {
        const emoji = l.emoji || "🛒";
        return '<div class="row" data-id="' + esc(l.id) + '">' +
          '<span class="badge">' + emoji + '</span>' +
          '<span class="body list-open" style="cursor:pointer">' +
            '<p class="txt">' + esc(l.name) + '</p>' +
            '<p class="meta">' + l.purchased_count + '/' + l.item_count + ' itens · ' + fmtMoney(l.total_cart) + ' no carrinho</p>' +
          '</span>' +
          '<button class="icon-btn" data-action="edit" title="Editar">✎</button>' +
          '<button class="icon-btn danger" data-action="delete" title="Excluir">🗑</button>' +
        '</div>';
      }).join("") + '</div>';

  root.innerHTML = navHeader("Listas de compras", null) + rowsHtml +
    '<div class="addrow">' +
      '<input type="text" id="new-list-emoji" class="emoji" placeholder="🛒">' +
      '<input type="text" id="new-list-name" placeholder="Nova lista (ex: Farmácia)">' +
      '<button class="primary small" id="add-list-btn">+ Lista</button>' +
    '</div>';

  wireNav(null);

  root.querySelectorAll(".row").forEach(row => {
    const id = row.dataset.id;
    row.querySelector(".list-open").addEventListener("click", () => openList(id));
    row.querySelector('[data-action="edit"]').addEventListener("click", () => {
      const l = lists.find(x => x.id === id);
      openListEditModal(l, loadLists);
    });
    row.querySelector('[data-action="delete"]').addEventListener("click", async () => {
      const l = lists.find(x => x.id === id);
      if(!(await confirmModal('Excluir a lista "' + l.name + '" e todos os seus itens?'))) return;
      try{ await api("shopping_list_delete", { id }); loadLists(); }
      catch(e){ handleAuthError(e, loadLists); }
    });
  });

  const addBtn = document.getElementById("add-list-btn");
  const nameInput = document.getElementById("new-list-name");
  const emojiInput = document.getElementById("new-list-emoji");
  limitToOneEmoji(emojiInput);
  const addList = async () => {
    const name = nameInput.value.trim();
    if(!name) return;
    addBtn.disabled = true;
    const emoji = emojiInput.value.trim();
    try{ await api("shopping_list_create", { name, emoji: emoji || undefined }); loadLists(); }
    catch(e){ addBtn.disabled = false; handleAuthError(e, loadLists); }
  };
  addBtn.addEventListener("click", addList);
  nameInput.addEventListener("keydown", e => { if(e.key === "Enter") addList(); });
  emojiInput.addEventListener("keydown", e => { if(e.key === "Enter") addList(); });
}

// ---- items screen ----

async function openList(id){
  root.innerHTML = '<p class="msg">Carregando…</p>';
  try{
    const [listsData, itemsData] = await Promise.all([
      api("shopping_lists"),
      api("shopping_items", { list_id: id })
    ]);
    const list = (listsData.lists || []).find(l => l.id === id);
    if(!list){ loadLists(); return; }
    currentList = list;
    renderItems(list, itemsData.items || []);
  }catch(e){ handleAuthError(e, loadLists); }
}

function itemRowHtml(it){
  return '<div class="row" data-id="' + esc(it.id) + '">' +
    '<label>' +
      '<input type="checkbox" data-purchase' + (it.purchased ? ' checked' : '') + '>' +
      '<span class="body"><p class="txt' + (it.purchased ? ' done' : '') + '">' + esc(it.name) + '</p></span>' +
    '</label>' +
    '<input class="price-input" type="number" step="0.01" min="0" placeholder="R$" value="' + (it.price != null ? it.price : '') + '">' +
    '<button class="icon-btn" data-action="rename-item" title="Renomear">✎</button>' +
    '<button class="icon-btn danger" data-action="delete-item" title="Remover">✕</button>' +
  '</div>';
}

function renderItems(list, items){
  const emoji = list.emoji || "🛒";
  const rowsHtml = items.length === 0
    ? '<p class="msg" id="items-empty">Nenhum item nesta lista ainda.</p>'
    : '<div class="card" id="items-card">' + items.map(itemRowHtml).join("") + '</div>';

  root.innerHTML = navHeader(list.name, loadLists, emoji) + rowsHtml +
    '<div class="addrow">' +
      '<input type="text" id="new-item-name" placeholder="Novo item">' +
      '<input type="number" step="0.01" min="0" class="price" id="new-item-price" placeholder="R$">' +
      '<button class="primary small" id="add-item-btn">+</button>' +
    '</div>' +
    '<div class="total-bar">Total lista: <strong id="total-all">' + fmtMoney(list.total_all) + '</strong> · No carrinho: <strong id="total-cart">' + fmtMoney(list.total_cart) + '</strong></div>';

  wireNav(loadLists);

  // Recomputed client-side from the already-loaded items, so any item
  // change can update the totals in place instead of refetching the list
  // (which used to reload the whole screen on every tap).
  function recomputeTotals(){
    const totalAllEl = document.getElementById("total-all");
    const totalCartEl = document.getElementById("total-cart");
    if(!totalAllEl || !totalCartEl) return;
    const sum = pred => items.filter(pred).reduce((acc, i) => acc + (Number(i.price) || 0), 0);
    totalAllEl.textContent = fmtMoney(sum(() => true));
    totalCartEl.textContent = fmtMoney(sum(i => i.purchased));
  }

  function wireItemRow(it){
    const row = root.querySelector('.row[data-id="' + it.id + '"]');
    if(!row) return;
    row.querySelector("[data-purchase]").addEventListener("change", async (e) => {
      const checked = e.target.checked;
      const prevPurchased = it.purchased;
      it.purchased = checked;
      row.querySelector(".txt").classList.toggle("done", checked);
      recomputeTotals();
      try{
        await api("shopping_item_update", { id: it.id, purchased: checked });
      }catch(err){
        if(err.unauthorized){ handleAuthError(err, loadLists); return; }
        it.purchased = prevPurchased;
        e.target.checked = prevPurchased;
        row.querySelector(".txt").classList.toggle("done", prevPurchased);
        recomputeTotals();
        alert("Não foi possível salvar. Tente novamente.");
      }
    });
    row.querySelector(".price-input").addEventListener("change", async (e) => {
      const v = e.target.value.trim();
      const newPrice = v === "" ? null : v;
      const prevPrice = it.price;
      it.price = newPrice === null ? null : Number(newPrice);
      recomputeTotals();
      try{
        await api("shopping_item_update", { id: it.id, price: newPrice });
      }catch(err){
        if(err.unauthorized){ handleAuthError(err, loadLists); return; }
        it.price = prevPrice;
        e.target.value = prevPrice != null ? prevPrice : "";
        recomputeTotals();
        alert("Não foi possível salvar. Tente novamente.");
      }
    });
    row.querySelector('[data-action="rename-item"]').addEventListener("click", async () => {
      const name = await promptModal("Renomear item", "Novo nome do item:", it.name);
      if(name === null) return;
      const trimmed = name.trim();
      if(!trimmed || trimmed === it.name) return;
      const prevName = it.name;
      it.name = trimmed;
      row.querySelector(".txt").textContent = trimmed;
      try{
        await api("shopping_item_rename", { id: it.id, name: trimmed });
      }catch(err){
        if(err.unauthorized){ handleAuthError(err, loadLists); return; }
        it.name = prevName;
        row.querySelector(".txt").textContent = prevName;
        alert("Não foi possível salvar. Tente novamente.");
      }
    });
    row.querySelector('[data-action="delete-item"]').addEventListener("click", async () => {
      if(!(await confirmModal('Remover "' + it.name + '"?'))) return;
      const idx = items.indexOf(it);
      const parent = row.parentNode;
      const nextSibling = row.nextElementSibling;
      if(idx !== -1) items.splice(idx, 1);
      row.remove();
      recomputeTotals();

      let emptyMsg = null;
      if(items.length === 0 && parent){
        emptyMsg = document.createElement("p");
        emptyMsg.className = "msg";
        emptyMsg.id = "items-empty";
        emptyMsg.textContent = "Nenhum item nesta lista ainda.";
        parent.replaceWith(emptyMsg);
      }

      try{
        await api("shopping_item_delete", { id: it.id });
      }catch(err){
        if(err.unauthorized){ handleAuthError(err, loadLists); return; }
        if(idx !== -1) items.splice(idx, 0, it);
        if(emptyMsg) emptyMsg.replaceWith(parent);
        parent.insertBefore(row, nextSibling);
        recomputeTotals();
        alert("Não foi possível remover. Tente novamente.");
      }
    });
  }

  items.forEach(wireItemRow);

  const addBtn = document.getElementById("add-item-btn");
  const nameInput = document.getElementById("new-item-name");
  const priceInput = document.getElementById("new-item-price");
  const addItem = async () => {
    const name = nameInput.value.trim();
    if(!name) return;
    addBtn.disabled = true;
    const price = priceInput.value.trim();
    try{
      const data = await api("shopping_item_add", { list_id: list.id, name, price: price === "" ? null : price });
      items.push(data.item);
      nameInput.value = "";
      priceInput.value = "";

      let card = document.getElementById("items-card");
      if(!card){
        card = document.createElement("div");
        card.className = "card";
        card.id = "items-card";
        const emptyMsg = document.getElementById("items-empty");
        if(emptyMsg) emptyMsg.replaceWith(card);
      }
      const wrapper = document.createElement("div");
      wrapper.innerHTML = itemRowHtml(data.item);
      card.appendChild(wrapper.firstElementChild);
      wireItemRow(data.item);
      recomputeTotals();
    }catch(err){
      if(err.unauthorized){ handleAuthError(err, loadLists); }
      else alert("Não foi possível adicionar. Tente novamente.");
    }finally{
      addBtn.disabled = false;
    }
  };
  addBtn.addEventListener("click", addItem);
  nameInput.addEventListener("keydown", e => { if(e.key === "Enter") addItem(); });
  priceInput.addEventListener("keydown", e => { if(e.key === "Enter") addItem(); });
}

loadLists();
</script>
</body>
</html>
